<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <!-- css fils -->
  <link rel="stylesheet" href="css/main.css">
  <!-- end css fils -->
  <!-- fonts file -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
  <!-- fonts file -->
  <title>Calculator app</title>

  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
<div class="content">
    
<div class="header">
  <h1 class="logo">calc</h1>

  <div class="theme-container">
    <span class="theme-title">THEME</span>
    
    <div class="theme-switcher">
      <div class="theme-numbers">
        <span>1</span>
        <span>2</span>
        <span>3</span>
      </div>
      
      <div class="toggle-bar">
        <div class="toggle-circle"></div>
      </div>
    </div>
  </div>
</div>

    <div class="result-container"></div>

    <div class="components">
      <div>7</div>
      <div>8</div>
      <div>9</div>
      <div class="btn-del">DEL</div>
      
      <div>4</div>
      <div>5</div>
      <div>6</div>
      <div>+</div>
      
      <div>1</div>
      <div>2</div>
      <div>3</div>
      <div>-</div>
      
      <div>.</div>
      <div>0</div>
      <div>/</div>
      <div>x</div>
      
      <div class="btn-reset">RESET</div>
      <div class="btn-equal">=</div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
